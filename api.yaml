info:
  title: shift backend 🔥
  description: Апи для выполнения индивидуальных заданий
  version: '1.0'
  contact: {}
tags: []
servers:
  - url: https://juniorsbootcamp.ru/
components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
  schemas:
    LoanFeedItem:
      type: object
      properties:
        id:
          type: number
          example: 1
          description: Идентификатор займа
        first_name:
          type: string
          example: Борис
          description: Имя
        last_name:
          type: string
          example: Михеев
          description: Фамилия
        amount:
          type: number
          example: 15000
          description: Сумма кредита
        percent:
          type: number
          example: 1.9
          description: Процентная ставка
        status:
          type: string
          example: APPROVED
          description: Процентная ставка
          enum:
            - APPROVED
            - REGISTERED
            - REJECTED
      required:
        - id
        - first_name
        - last_name
        - amount
        - percent
        - status
    Loan:
      type: object
      properties:
        id:
          type: number
          example: 1
          description: Идентификатор займа
        first_name:
          type: string
          example: Борис
          description: Имя
        last_name:
          type: string
          example: Михеев
          description: Фамилия
        amount:
          type: number
          example: 15000
          description: Сумма кредита
        percent:
          type: number
          example: 1.9
          description: Процентная ставка
        status:
          type: string
          example: APPROVED
          description: Процентная ставка
          enum:
            - APPROVED
            - REGISTERED
            - REJECTED
        phone:
          type: string
          example: '+77259786293'
          description: Номер телефона
        date:
          type: string
          example: 2024-05-25T12:01:44Z
          description: Дата выдачи кредита
        period:
          type: number
          example: 20
          description: Срок кредита
      required:
        - id
        - first_name
        - last_name
        - amount
        - percent
        - status
        - phone
        - date
        - period
    User:
      type: object
      properties:
        _id:
          type: string
          description: ID пользователя
        phone:
          type: string
          example: '89990009999'
          description: Номер телефона
        firstname:
          type: string
          example: firstname
          description: Имя
        middlename:
          type: string
          example: middlename
          description: Отчество
        lastname:
          type: string
          example: lastname
          description: Фамилия
        email:
          type: string
          example: email@gmail.com
          description: Почта
        city:
          type: string
          example: city
          description: Город
      required:
        - _id
        - phone
    SessionResponse:
      type: object
      properties:
        success:
          type: boolean
          description: Статус запроса
        reason:
          type: string
          description: Причина ошибки
        user:
          description: Пользователь
          allOf:
            - $ref: '#/components/schemas/User'
      required:
        - success
        - user
    UpdateProfileProfileDto:
      type: object
      properties:
        firstname:
          type: string
          example: firstname
          description: Имя
        middlename:
          type: string
          example: middlename
          description: Отчество
        lastname:
          type: string
          example: lastname
          description: Фамилия
        email:
          type: string
          example: email@gmail.com
          description: Почта
        city:
          type: string
          example: city
          description: Город
    UpdateProfileDto:
      type: object
      properties:
        profile:
          description: Данные пользователя
          allOf:
            - $ref: '#/components/schemas/UpdateProfileProfileDto'
        phone:
          type: string
          example: '89990009999'
          description: Номер телефона
      required:
        - profile
        - phone
    UpdateProfileResponse:
      type: object
      properties:
        success:
          type: boolean
          description: Статус запроса
        reason:
          type: string
          description: Причина ошибки
        user:
          description: Пользователь
          allOf:
            - $ref: '#/components/schemas/User'
      required:
        - success
        - user
    CreateOtpDto:
      type: object
      properties:
        phone:
          type: string
          example: '89990009999'
      required:
        - phone
    OtpResponse:
      type: object
      properties:
        success:
          type: boolean
          description: Статус запроса
        reason:
          type: string
          description: Причина ошибки
        retryDelay:
          type: number
          example: 120000
          description: Время запроса повторного отп кода в мс
      required:
        - success
        - retryDelay
    SignInDto:
      type: object
      properties:
        phone:
          type: string
          example: '89990009999'
          description: Номер телефона
        code:
          type: number
          example: 345231
          description: Отп код
      required:
        - phone
        - code
    SignInResponse:
      type: object
      properties:
        success:
          type: boolean
          description: Статус запроса
        reason:
