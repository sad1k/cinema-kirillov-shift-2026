  /api/cars/info:
    get:
      operationId: CarsController_getCars
      summary: Получить все автомобили
      parameters:
        - name: search
          required: false
          in: query
          description: Поиск
          schema:
            type: string
        - name: maxPrice
          required: false
          in: query
          description: Максимальная цена аренды
          schema:
            type: number
        - name: minPrice
          required: false
          in: query
          description: Минимальная цена аренды
          schema:
            type: number
        - name: transmission
          required: false
          in: query
          description: Тип трансмиссии
          schema:
            enum:
              - automatic
              - manual
            type: string
        - name: bodyType
          required: false
          in: query
          description: Тип кузова автомобиля
          schema:
            enum:
              - sedan
              - suv
              - coupe
              - hatchback
              - cabriolet
            type: string
        - name: brand
          required: false
          in: query
          description: Марка автомобиля
          schema:
            enum:
              - Haval
              - Hyundai
              - Volkswagen
              - Kia
              - Geely
              - Mercedes
              - Garden car
              - Grocery cart
              - Haier
              - Invalid
            type: string
        - name: color
          required: false
          in: query
          description: Цвет автомобиля
          schema:
            enum:
              - black
              - white
              - red
              - silver
              - blue
              - grey
              - orange
            type: string
        - name: limit
          required: false
          in: query
          description: Количество элементов на странице (по умолчанию 10)
          schema:
            type: number
        - name: page
          required: false
          in: query
          description: Номер текущей страницы (по умолчанию 1)
          schema:
            type: number
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarsPaginatedResponse'
      tags:
        - 🏎️ cars
